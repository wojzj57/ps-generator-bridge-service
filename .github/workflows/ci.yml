name: CI

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test with coverage
        run: pnpm test:ci

      - name: Upload coverage reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          path: packages/*/coverage/
          if-no-files-found: ignore
          retention-days: 7

      - name: Build
        run: pnpm build

      - name: Check package contents
        run: pnpm pack:check

      - name: Build docs
        run: pnpm docs:build

  standalone-runtime:
    name: Generator standalone runtime
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - name: Setup build Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pack generator runtime
        shell: pwsh
        run: pnpm --filter @ps-generator-bridge/generator pack --pack-destination $env:RUNNER_TEMP

      - name: Extract packed runtime
        shell: pwsh
        run: |
          $archive = Get-ChildItem -LiteralPath $env:RUNNER_TEMP -Filter "ps-generator-bridge-generator-*.tgz" | Select-Object -First 1
          if (-not $archive) { throw "Generator runtime tarball was not created" }
          $target = Join-Path $env:RUNNER_TEMP "generator-runtime-check"
          New-Item -ItemType Directory -Path $target | Out-Null
          & "$env:WINDIR\System32\tar.exe" -xzf $archive.FullName -C $target
          "RUNTIME_DIR=$(Join-Path $target 'package')" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Setup Photoshop Node baseline
        uses: actions/setup-node@v4
        with:
          node-version: 18.13.0

      - name: Verify packed runtime in isolation
        shell: pwsh
        env:
          NODE_PATH: ""
          PS_BRIDGE_EXPECT_NODE_VERSION: 18.13.0
        run: node packages/generator/scripts/verifyPackedRuntime.mjs $env:RUNTIME_DIR
