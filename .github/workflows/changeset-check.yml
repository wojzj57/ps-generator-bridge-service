name: Changeset Check

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled

permissions:
  contents: read
  pull-requests: read

jobs:
  changeset-check:
    name: Require changeset for publishable changes
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-release') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changeset
        shell: bash
        run: |
          changed_files=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")

          publishable_changes=$(printf '%s\n' "$changed_files" | grep -E '^(packages/(sdk|generator|testkit)/src/|packages/generator/jsx/)' || true)
          changesets=$(printf '%s\n' "$changed_files" | grep -E '^\.changeset/.+\.md$' || true)

          if [[ -n "$publishable_changes" && -z "$changesets" ]]; then
            echo "Publishable package changes require a changeset."
            echo "Add one with 'pnpm changeset', or apply the 'no-release' label if this PR should not publish."
            echo "Changed publishable files:"
            printf '%s\n' "$publishable_changes"
            exit 1
          fi

          echo "Changeset check passed."
