name: Release

on:
  # npm trusted publishing requires a branch or manual-dispatch OIDC context.
  # Do not move package publishing back to pull_request_target.
  push:
    branches:
      - master
    paths:
      - "packages/*/package.json"
      - "packages/*/CHANGELOG.md"
      - "pnpm-lock.yaml"
  workflow_dispatch:
    inputs:
      base_sha:
        description: Base commit of the merged release PR
        required: true
        type: string
      release_sha:
        description: Merge commit of the release PR to publish
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read
  id-token: write

jobs:
  release:
    name: Build and publish packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_sha || github.sha }}
          fetch-depth: 0

      - name: Validate manual recovery target
        if: github.event_name == 'workflow_dispatch'
        env:
          MASTER_SHA: ${{ github.sha }}
          RELEASE_SHA: ${{ inputs.release_sha }}
        run: git merge-base --is-ancestor "$RELEASE_SHA" "$MASTER_SHA"

      - name: Validate release commit
        env:
          BASE_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.base_sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.release_sha || github.sha }}
          IS_RELEASE: "true"
        run: node scripts/check-release-intent.mjs

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build publishable packages
        run: pnpm build

      - name: Check package contents
        run: pnpm pack:check

      - name: Publish packages
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
